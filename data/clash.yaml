mode: rule
ipv6: true

# ---------- GEO 数据库 ----------
geodata-mode: true
geodata-loader: standard
geo-auto-update: true
geo-update-interval: 24 # 单位: 小时
geox-url:
  geoip: https://cdn.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geoip.dat
  geosite: https://cdn.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geosite.dat
  mmdb: https://cdn.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/country.mmdb
  asn: https://cdn.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/GeoLite2-ASN.mmdb

# ---------- DNS ----------
dns:
  enable: true
  ipv6: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  # fake-ip 白名单（局域网 / 直连域名不走 fake-ip）
  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - localhost.ptlogin2.qq.com
  nameserver:
    - 223.5.5.5 # 阿里 DNS（国内首选）
    - 119.29.29.29 # 腾讯 DNS
  fallback:
    - https://1.1.1.1/dns-query # Cloudflare DoH（走代理）
    - https://8.8.8.8/dns-query # Google DoH（走代理）
  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:
      - 240.0.0.0/4

# ============================================================
# 代理节点
# ============================================================
proxies:
  - name: {{NODE_NAME}}
    type: vless
    server: {{SERVER}}
    port: {{PORT}}
    uuid: {{UUID}}
    network: {{NETWORK}}
    tls: {{TLS}}
    udp: true
    ws-opts:
      path: {{PATH}}
      headers:
        Host: {{SERVER}}

# ============================================================
# 代理组
# ============================================================
proxy-groups:
  # 主选择组 —— 手动切换节点
  - name: PROXY
    type: select
    proxies:
      - {{NODE_NAME}}

# ============================================================
# 分流规则  （顺序：精确域名 → 关键词 → GeoSite → GeoIP → 兜底）
# ============================================================
rules:
  # ------- 强制直连：内网 / 私有服务 -------
  - DOMAIN-SUFFIX,svc.cluster.local,DIRECT

  # ------- 强制直连：微信 / WeChat -------
  - DOMAIN-SUFFIX,qq.com,DIRECT
  - DOMAIN-SUFFIX,weixinbridge.com,DIRECT
  - DOMAIN-SUFFIX,servicewechat.com,DIRECT

  # ------- 强制直连：国内常用服务 -------
  - DOMAIN-SUFFIX,tencent.com,DIRECT
  - DOMAIN-SUFFIX,icloud.com,DIRECT
  - DOMAIN-SUFFIX,microsoft.com,DIRECT
  - DOMAIN-SUFFIX,bing.com,DIRECT
  - DOMAIN-SUFFIX,qwen.ai,DIRECT
  - DOMAIN-SUFFIX,deepseek.com,DIRECT
  - DOMAIN-SUFFIX,minimaxi.com,DIRECT
  - DOMAIN-SUFFIX,alicdn.com,DIRECT
  - DOMAIN-SUFFIX,taobao.com,DIRECT
  - DOMAIN-SUFFIX,aliyun.com,DIRECT
  - DOMAIN-SUFFIX,cloudwego.io,DIRECT
  - DOMAIN-SUFFIX,gitee.com,DIRECT
  - DOMAIN-SUFFIX,dingtalkapps.com,DIRECT

  # ------- 代理：AI 工具 -------
